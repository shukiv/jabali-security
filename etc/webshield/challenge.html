<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Security Check — Jabali</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1117;color:#e4e4e7}
.card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.logo{font-size:14px;font-weight:600;letter-spacing:1px;color:#71717a;margin-bottom:24px;text-transform:uppercase}
h1{font-size:20px;font-weight:600;margin-bottom:8px;color:#fafafa}
.desc{font-size:14px;color:#a1a1aa;margin-bottom:28px;line-height:1.5}
.progress-wrap{background:#27272a;border-radius:8px;height:6px;overflow:hidden;margin-bottom:16px}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:8px;transition:width .15s}
.status{font-size:13px;color:#71717a;min-height:20px}
.status.ok{color:#22c55e}
.status.fail{color:#ef4444}
.shield{font-size:40px;margin-bottom:16px;opacity:.7}
noscript .card{border-color:#ef4444}
</style>
</head>
<body>
<noscript>
<div class="card">
<div class="shield">&#x1F6E1;</div>
<h1>JavaScript Required</h1>
<p class="desc">This security check requires JavaScript. Please enable it and reload the page.</p>
</div>
</noscript>
<div class="card" id="main" style="display:none">
<div class="logo">Jabali Security</div>
<div class="shield">&#x1F6E1;</div>
<h1>Checking your browser</h1>
<p class="desc">This is an automated security check. You will be redirected shortly.</p>
<div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
<div class="status" id="status">Initializing...</div>
</div>
<script>
(function(){
"use strict";
var DIFFICULTY = 18;
var TTL = 86400;
var el = document.getElementById("main");
var bar = document.getElementById("bar");
var st = document.getElementById("status");
el.style.display = "";

/* --- SHA-256 (pure JS, synchronous for PoW throughput) --- */
function sha256(msg) {
    var K = [
        0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
        0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
        0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
        0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
        0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
        0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
        0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
        0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ];
    var H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var l = msg.length, bl = l * 8;
    /* padding */
    msg += "\x80";
    while (msg.length % 64 !== 56) msg += "\x00";
    msg += String.fromCharCode(0,0,0,0);
    msg += String.fromCharCode((bl>>>24)&0xff,(bl>>>16)&0xff,(bl>>>8)&0xff,bl&0xff);
    for (var off = 0; off < msg.length; off += 64) {
        var W = new Array(64), a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
        for (var i = 0; i < 16; i++)
            W[i] = (msg.charCodeAt(off+i*4)<<24)|(msg.charCodeAt(off+i*4+1)<<16)|(msg.charCodeAt(off+i*4+2)<<8)|msg.charCodeAt(off+i*4+3);
        for (i = 16; i < 64; i++) {
            var s0 = (W[i-15]>>>7|W[i-15]<<25)^(W[i-15]>>>18|W[i-15]<<14)^(W[i-15]>>>3);
            var s1 = (W[i-2]>>>17|W[i-2]<<15)^(W[i-2]>>>19|W[i-2]<<13)^(W[i-2]>>>10);
            W[i] = (W[i-16]+s0+W[i-7]+s1)|0;
        }
        for (i = 0; i < 64; i++) {
            s1 = (e>>>6|e<<26)^(e>>>11|e<<21)^(e>>>25|e<<7);
            var ch = (e&f)^(~e&g);
            var t1 = (h+s1+ch+K[i]+W[i])|0;
            s0 = (a>>>2|a<<30)^(a>>>13|a<<19)^(a>>>22|a<<10);
            var maj = (a&b)^(a&c)^(b&c);
            var t2 = (s0+maj)|0;
            h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
        }
        H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;
        H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    var hex = "";
    for (i = 0; i < 8; i++) {
        var v = H[i];
        hex += ((v>>>28)&0xf).toString(16)+((v>>>24)&0xf).toString(16)+
               ((v>>>20)&0xf).toString(16)+((v>>>16)&0xf).toString(16)+
               ((v>>>12)&0xf).toString(16)+((v>>>8)&0xf).toString(16)+
               ((v>>>4)&0xf).toString(16)+(v&0xf).toString(16);
    }
    return hex;
}

function leadingZeroBits(hexHash) {
    for (var i = 0; i < hexHash.length; i++) {
        var n = parseInt(hexHash[i], 16);
        if (n === 0) continue;
        /* count leading zeros in this nibble */
        if (n >= 8) return i * 4;
        if (n >= 4) return i * 4 + 1;
        if (n >= 2) return i * 4 + 2;
        return i * 4 + 3;
    }
    return hexHash.length * 4;
}

/* --- Solve PoW --- */
var timestamp = Math.floor(Date.now() / 1000);
var challenge = timestamp.toString();
var nonce = 0;
var batchSize = 5000;
/* estimate total work: 2^difficulty average */
var estimated = Math.pow(2, DIFFICULTY);

st.textContent = "Verifying...";

function solveBatch() {
    var end = nonce + batchSize;
    for (; nonce < end; nonce++) {
        var hash = sha256(challenge + ":" + nonce.toString(16));
        if (leadingZeroBits(hash) >= DIFFICULTY) {
            /* solved */
            bar.style.width = "100%";
            st.textContent = "Verified! Redirecting...";
            st.className = "status ok";
            /* set cookie */
            var cv = timestamp + "." + nonce.toString(16) + "." + DIFFICULTY;
            document.cookie = "jabali_passed=" + cv + ";path=/;max-age=" + TTL + ";SameSite=Lax";
            setTimeout(function(){ location.reload(); }, 400);
            return;
        }
    }
    /* update progress */
    var pct = Math.min(95, Math.floor((nonce / estimated) * 100));
    bar.style.width = pct + "%";
    st.textContent = "Verifying... " + pct + "%";
    setTimeout(solveBatch, 0);
}

solveBatch();
})();
</script>
</body>
</html>
