{% macro protection_toggle(feature, label, enabled) %}
<form method="post" action="/toggle/{{ feature }}" style="display:inline">
    <button type="submit" class="toggle-btn {{ 'toggle-btn-on' if enabled else 'toggle-btn-off' }}">
        {{ "Enabled" if enabled else "Disabled" }}
    </button>
</form>
{% endmacro %}
